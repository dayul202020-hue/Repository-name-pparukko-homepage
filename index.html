<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>빠루꼬 철거</title>
  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#111;
      color:#fff;
      text-align:center;
    }

    h1{
      font-size:48px;
      margin-top:50px;
      margin-bottom:20px;
    }

    .phone{
      font-size:28px;
      margin-bottom:40px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
      padding:30px;
      max-width:1400px;
      margin:0 auto;
    }

    .gallery img{
      width:100%;
      border-radius:14px;
      display:block;
    }
  </style>
</head>
<body>
  <h1>빠루꼬 철거</h1>
  <div class="phone">문의 : 010-XXXX-XXXX</div>

  <div class="gallery">
    <img src="work1.jpg">
    <img src="work2.jpg">
    <img src="work3.jpg">
    <img src="work4.jpg">
    <img src="work5.jpg">
    <img src="work6.jpg">
    <img src="work7.jpg">
  </div>
</body>
</html>
